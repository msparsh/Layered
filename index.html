<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Bujo - Spread 📖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow: hidden; background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        [contenteditable]:empty::before { content: "\FEFF"; }
        .bullet-block { animation: slideIn 0.15s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        
        .bullet-block { cursor: default; }
        .bullet-handle { cursor: grab; user-select: none; }
        .bullet-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.3; }
        
        .bullet-text { 
            cursor: text; 
            user-select: text; 
            word-break: break-word; 
            -webkit-hyphens: auto; 
            hyphens: auto; 
        }
    </style>
</head>
<body class="text-zinc-800">

    <div id="app" class="flex transition-transform duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] w-full h-screen will-change-transform"></div>
    <div id="page-indicator" class="fixed bottom-2 left-1/2 -translate-x-1/2 flex gap-3 z-50 p-4 cursor-grab active:cursor-grabbing touch-none"></div>
    
    <script>
        // ==========================================
        // 💾 PERSISTENCE LAYER
        // ==========================================
        const FileSystemAPI = {
            async readJson(path) { return await window.electronAPI.readJson(path); },
            async writeJsonAtomic(path, data) { return await window.electronAPI.writeJsonAtomic(path, data); },
            async trashJson(path) { return await window.electronAPI.trashJson(path); }
        };

        const StorageManager = {
            async loadNotebookMeta() {
                const meta = await FileSystemAPI.readJson('meta.json');
                if (meta) {
                    if (meta.spreadOrder) {
                        meta.pageOrder = meta.spreadOrder.map(id => id.replace('spread-', 'page-'));
                        delete meta.spreadOrder;
                    }
                    return { version: 2, currentP: 0, pageOrder: [], scrolls: [], ...meta };
                }
                return { version: 2, currentP: 0, pageOrder: [], scrolls: [] };
            },
            async saveNotebookMeta(metaData) { await FileSystemAPI.writeJsonAtomic('meta.json', metaData); },
            async loadPage(pageId) { return (await FileSystemAPI.readJson(`pages/${pageId}.json`)) || [createBlock()]; },
            async savePage(pageId, pageData) { await FileSystemAPI.writeJsonAtomic(`pages/${pageId}.json`, pageData); },
            async trashPage(pageId) { await FileSystemAPI.trashJson(`pages/${pageId}.json`); }
        };

        // ==========================================
        // 🧠 STATE & CONFIG
        // ==========================================
        const BULLETS = { task: '•', completed: '✕', migrated: '>', scheduled: '<', event: '○', note: '-' };
        const CYCLE = ['task', 'completed', 'migrated', 'scheduled', 'event', 'note'];
        const MD_MAP = {'* ': 'task', 'x ': 'completed', '> ': 'migrated', '< ': 'scheduled', 'o ': 'event', '- ': 'note', '# ': 'h1', '## ': 'h2', '### ': 'h3', '#### ': 'h4', '##### ': 'h5', '###### ': 'h6'};

        let metaData = { version: 2, currentP: 0, pageOrder: [], scrolls: [] };
        let pagesData = []; 
        let currentP = 0;   
        let saveTimeout = null;

        function createBlock(text = '', depth = 0, type = 'text') { return { id: crypto.randomUUID(), type, text, depth }; }

        async function initApp() {
            metaData = await StorageManager.loadNotebookMeta();
            if (metaData.pageOrder.length === 0) {
                metaData.pageOrder.push(`page-${crypto.randomUUID()}`, `page-${crypto.randomUUID()}`);
                await StorageManager.saveNotebookMeta(metaData);
            }
            pagesData = await Promise.all(metaData.pageOrder.map(id => StorageManager.loadPage(id)));
            currentP = metaData.currentP || 0;
            renderApp();
        }

        async function save(forceRender = false) { 
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                const layoutChanged = await cleanEmptySpreads();
                const activePair = Math.floor(currentP / 2) * 2;
                if(metaData.pageOrder[activePair]) await StorageManager.savePage(metaData.pageOrder[activePair], pagesData[activePair]);
                if(metaData.pageOrder[activePair + 1]) await StorageManager.savePage(metaData.pageOrder[activePair + 1], pagesData[activePair + 1]);
                
                metaData.currentP = currentP;
                await StorageManager.saveNotebookMeta(metaData);
                if (layoutChanged || forceRender) renderApp();
                else renderIndicator(); 
            }, 500); 
        }

        async function cleanEmptySpreads() {
            let layoutChanged = false;
            while (pagesData.length > 2) {
                const i = pagesData.length - 2;
                if (Math.floor(i / 2) === Math.floor(currentP / 2)) break;

                const p1Empty = pagesData[i].every(b => b.text.trim() === '' && b.type === 'text');
                const p2Empty = (pagesData[i+1] || []).every(b => b.text.trim() === '' && b.type === 'text');

                if (p1Empty && p2Empty) {
                    await StorageManager.trashPage(metaData.pageOrder[i]);
                    await StorageManager.trashPage(metaData.pageOrder[i+1]);
                    pagesData.splice(i, 2); metaData.pageOrder.splice(i, 2); metaData.scrolls.splice(i, 2);
                    layoutChanged = true;
                } else break;
            }
            if (currentP >= pagesData.length) { currentP = Math.max(0, pagesData.length - 2); layoutChanged = true; }
            return layoutChanged;
        }

        function updateScroll(idx, top) { metaData.scrolls[idx] = top; save(); }

        // ==========================================
        // 🎨 RENDERING
        // ==========================================
        function renderApp() {
            if (pagesData.length % 2 !== 0) {
                metaData.pageOrder.push(`page-${crypto.randomUUID()}`);
                pagesData.push([createBlock()]);
            }

            document.getElementById('app').innerHTML = pagesData.map((p, i) => `
                <div class="w-[50vw] h-screen flex-shrink-0 relative flex justify-center ${i % 2 === 0 ? 'border-r border-dashed border-zinc-300' : ''}">
                    <div class="w-full h-full overflow-y-auto px-10 pt-24 pb-32 flex justify-center scroll-container" data-idx="${i}" onscroll="updateScroll(${i}, this.scrollTop)">
                        <div class="w-full max-w-md bujo-list relative min-h-[50vh]" data-idx="${i}"></div>
                    </div>
                    <div class="absolute bottom-8 left-0 w-full text-center text-zinc-400 text-sm font-mono tracking-widest select-none pointer-events-none">${i + 1}</div>
                </div>
            `).join('');
            
            pagesData.forEach((_, i) => {
                renderPage(i);
                const container = document.querySelector(`.scroll-container[data-idx="${i}"]`);
                if (container && metaData.scrolls[i]) container.scrollTop = metaData.scrolls[i];
            });
            updateView();
        }

        function renderPage(pIdx) {
            const list = document.querySelector(`.bujo-list[data-idx="${pIdx}"]`);
            if(!list) return;
            
            list.innerHTML = pagesData[pIdx].map(b => {
                let textClass = getBlockClasses(b);
                const isBullet = CYCLE.includes(b.type);
                const symbol = isBullet ? BULLETS[b.type] : ''; 

                return `
                <div class="relative flex items-start mb-2 bullet-block group" data-id="${b.id}" style="margin-left: ${b.depth * 28}px">
                    <div class="absolute -left-8 top-0.5 w-7 h-7 flex items-center justify-center bullet-handle ${isBullet ? 'opacity-40 text-zinc-500' : 'opacity-0 text-zinc-300'} group-hover:opacity-100 hover:!text-black font-bold transition-all" 
                         onmousedown="this.parentElement.setAttribute('draggable', 'true')" 
                         onmouseup="this.parentElement.setAttribute('draggable', 'false')"
                         onmouseleave="this.parentElement.setAttribute('draggable', 'false')">
                        ${symbol || '::'} 
                    </div>
                    <div class="${textClass}" contenteditable="true" spellcheck="false">${b.text}</div>
                </div>`;
            }).join('');
        }

        function updateSingleBlockDOM(pIdx, bIdx) {
            const block = pagesData[pIdx][bIdx];
            const blockEl = document.querySelector(`[data-id="${block.id}"]`);
            if (!blockEl) return;

            blockEl.style.marginLeft = `${block.depth * 28}px`;

            const isBullet = CYCLE.includes(block.type);
            const handleEl = blockEl.querySelector('.bullet-handle');
            handleEl.className = `absolute -left-8 top-0.5 w-7 h-7 flex items-center justify-center bullet-handle ${isBullet ? 'opacity-40 text-zinc-500' : 'opacity-0 text-zinc-300'} group-hover:opacity-100 hover:!text-black font-bold transition-all`;
            handleEl.innerHTML = isBullet ? BULLETS[block.type] : '::';

            const textEl = blockEl.querySelector('.bullet-text');
            textEl.className = getBlockClasses(block);
            if (textEl.textContent !== block.text) textEl.textContent = block.text;
        }

        function getBlockClasses(b) {
            let cls = "flex-1 outline-none whitespace-pre-wrap min-h-[1.5rem] bullet-text transition-all duration-300 ";
            const styles = { 'h1': "text-4xl font-bold mt-6 mb-2 ", 'h2': "text-3xl font-bold mt-5 mb-2 ", 'h3': "text-2xl font-bold mt-4 mb-1 ", 'h4': "text-xl font-semibold mt-3 mb-1 ", 'h5': "text-lg font-semibold mt-2 mb-1 ", 'h6': "text-base font-semibold uppercase tracking-wider mt-2 mb-1 text-zinc-500 " };
            cls += styles[b.type] || "text-[1.05rem] leading-relaxed ";
            if (b.type === 'completed') cls += "line-through text-zinc-400 opacity-60";
            else if (['migrated', 'scheduled'].includes(b.type)) cls += "italic text-zinc-500";
            return cls;
        }

        function updateView() {
            document.getElementById('app').style.transform = `translateX(-${currentP * 50}vw)`;
            renderIndicator();
        }

        function renderIndicator() {
            const activePair = Math.floor(currentP / 2);
            document.getElementById('page-indicator').innerHTML = Array.from({length: Math.ceil(pagesData.length / 2)}).map((_, i) => 
                `<span onclick="jumpToPair(${i})" class="pointer-events-none h-2 rounded-full transition-all duration-300 ${i === activePair ? 'w-6 bg-zinc-800' : 'w-2 bg-zinc-300 hover:bg-zinc-400'}"></span>`
            ).join('');
        }

        // ==========================================
        // 🛠️ COMMAND OPERATIONS
        // ==========================================
        function indentBlock(pIdx, bIdx, direction) {
            pagesData[pIdx][bIdx].depth = Math.max(0, Math.min(4, pagesData[pIdx][bIdx].depth + direction));
            updateSingleBlockDOM(pIdx, bIdx);
            save();
        }

        function setBlockType(pIdx, bIdx, newType, newText = null) {
            const block = pagesData[pIdx][bIdx];
            block.type = newType;
            if (newText !== null) block.text = newText;
            updateSingleBlockDOM(pIdx, bIdx);
            save();
        }

        function splitBlock(pIdx, bIdx, caretPos) {
            const pageList = pagesData[pIdx];
            const block = pageList[bIdx];
            const txt = block.text;
            block.text = txt.slice(0, caretPos);
            
            const newType = block.type.startsWith('h') ? 'text' : block.type;
            const newBlock = createBlock(txt.slice(caretPos), block.depth, newType);
            
            pageList.splice(bIdx + 1, 0, newBlock);
            updateSingleBlockDOM(pIdx, bIdx); 
            renderPage(pIdx); 
            focusBlock(newBlock.id, true);
            save();
        }

        function mergeBlocks(pIdx, bIdx) {
            const pageList = pagesData[pIdx];
            const block = pageList[bIdx];
            const prevBlock = pageList[bIdx - 1];
            
            const prevLength = prevBlock.text.length;
            prevBlock.text += block.text;
            pageList.splice(bIdx, 1);
            
            renderPage(pIdx);
            save();
            
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${prevBlock.id}"] .bullet-text`);
                if (!el) return;
                el.focus();
                const sel = window.getSelection();
                const range = document.createRange();
                if (el.firstChild) range.setStart(el.firstChild, prevLength);
                else range.setStart(el, 0);
                range.collapse(true);
                sel.removeAllRanges(); sel.addRange(range);
            }, 10);
        }

        // ==========================================
        // 🕹️ NAVIGATION & UTILS
        // ==========================================
        function jumpToPair(pairIdx) { currentP = pairIdx * 2; updateView(); save(); }

        async function changePage(dir) {
            const nextP = currentP + dir * 2;
            if (nextP < 0) return;
            if (nextP >= pagesData.length) {
                metaData.pageOrder.push(`page-${crypto.randomUUID()}`, `page-${crypto.randomUUID()}`);
                pagesData.push([createBlock()], [createBlock()]);
                await StorageManager.saveNotebookMeta(metaData);
                renderApp();
            }
            currentP = nextP; updateView(); save();
        }

        function getCaretPos(el) { 
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const r = sel.getRangeAt(0).cloneRange();
                r.selectNodeContents(el);
                r.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
                return r.toString().length;
            }
            return 0;
        }

        function focusBlock(id, atStart = false) {
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${id}"] .bullet-text`);
                if (!el) return;
                el.focus();
                const sel = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(atStart);
                sel.removeAllRanges(); sel.addRange(range);
            }, 10);
        }

        // ==========================================
        // ⌨️ EVENT LISTENERS
        // ==========================================
        document.addEventListener('input', e => {
            if(!e.target.classList.contains('bullet-text')) return;
            
            const listEl = e.target.closest('.bujo-list');
            const pIdx = parseInt(listEl.dataset.idx);
            const blockDiv = e.target.closest('.bullet-block');
            const bIdx = pagesData[pIdx].findIndex(b => b.id === blockDiv.dataset.id);
            const block = pagesData[pIdx][bIdx];

            block.text = e.target.textContent;

            for (const [prefix, type] of Object.entries(MD_MAP)) {
                if (block.text.startsWith(prefix)) {
                    setBlockType(pIdx, bIdx, type, block.text.substring(prefix.length));
                    focusBlock(block.id, true);
                    return;
                }
            }
            save(); 
        });

        document.addEventListener('keydown', e => {
            const isEditing = e.target.classList.contains('bullet-text');
            if (!isEditing) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); }
                if (e.key === 'ArrowRight') { e.preventDefault(); changePage(1); }
                return;
            }

            if (e.key === 'Escape') { e.preventDefault(); e.target.blur(); return; }

            const pIdx = parseInt(e.target.closest('.bujo-list').dataset.idx);
            const blockDiv = e.target.closest('.bullet-block');
            const bIdx = pagesData[pIdx].findIndex(b => b.id === blockDiv.dataset.id);
            const block = pagesData[pIdx][bIdx];

            if (e.altKey && e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); return; }
            if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); changePage(1); return; }
            if (e.altKey && e.key === 'Enter') { e.preventDefault(); changePage(1); return; }
            
            if (e.ctrlKey && e.key === 'Enter') { 
                e.preventDefault(); 
                let currentIndex = CYCLE.indexOf(block.type);
                setBlockType(pIdx, bIdx, currentIndex === -1 ? 'task' : CYCLE[(currentIndex + 1) % CYCLE.length]);
                return; 
            }

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                splitBlock(pIdx, bIdx, getCaretPos(e.target));
                return;
            }

            if (e.key === 'Tab') {
                e.preventDefault();
                indentBlock(pIdx, bIdx, e.shiftKey ? -1 : 1);
                return;
            }
            
            if (e.key === 'Backspace' && getCaretPos(e.target) === 0) {
                e.preventDefault();
                if (block.type !== 'text') setBlockType(pIdx, bIdx, 'text');
                else if (bIdx > 0) mergeBlocks(pIdx, bIdx);
            }

            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                const sel = window.getSelection();
                if (!sel.rangeCount) return;
                const rect = sel.getRangeAt(0).getBoundingClientRect();
                const elRect = e.target.getBoundingClientRect();
                
                if (e.key === 'ArrowUp' && (rect.top - elRect.top < 24)) {
                    const prev = blockDiv.previousElementSibling;
                    if (prev) { e.preventDefault(); focusBlock(prev.dataset.id, false); }
                } else if (e.key === 'ArrowDown' && (elRect.bottom - rect.bottom < 24)) {
                    const next = blockDiv.nextElementSibling;
                    if (next) { e.preventDefault(); focusBlock(next.dataset.id, true); }
                }
            }
        });

        // ==========================================
        // ✋ DRAG & DROP & SCRUB
        // ==========================================
        let draggedId = null, sourcePIdx = null;

        document.addEventListener('dragstart', e => {
            const block = e.target.closest('.bullet-block');
            if(block && block.getAttribute('draggable') === 'true') {
                draggedId = block.dataset.id; sourcePIdx = parseInt(block.closest('.bujo-list').dataset.idx);
                setTimeout(() => block.classList.add('dragging'), 0);
            } else e.preventDefault(); 
        });

        document.addEventListener('dragover', e => {
            e.preventDefault();
            const target = e.target.closest('.bullet-block');
            if(target && target.dataset.id !== draggedId) {
                const rect = target.getBoundingClientRect();
                const draggedEl = document.querySelector(`[data-id="${draggedId}"]`);
                if (e.clientY > rect.top + rect.height / 2) target.parentNode.insertBefore(draggedEl, target.nextSibling);
                else target.parentNode.insertBefore(draggedEl, target);
            }
        });

        document.addEventListener('dragend', () => {
            const el = document.querySelector(`[data-id="${draggedId}"]`);
            if(el) {
                el.classList.remove('dragging'); el.setAttribute('draggable', 'false'); 
                const targetList = el.closest('.bujo-list');
                if (targetList) {
                    const targetPIdx = parseInt(targetList.dataset.idx);
                    const allBlocks = pagesData.flat();
                    const rebuildPage = (idx) => {
                        const list = document.querySelector(`.bujo-list[data-idx="${idx}"]`);
                        if (list) pagesData[idx] = Array.from(list.children).map(c => allBlocks.find(b => b.id === c.dataset.id));
                    };
                    rebuildPage(sourcePIdx);
                    if (sourcePIdx !== targetPIdx) rebuildPage(targetPIdx);
                }
            }
            save(); draggedId = null; sourcePIdx = null;
        });

        const indicator = document.getElementById('page-indicator');
        let isScrubbing = false;

        function handleScrub(e) {
            const rect = indicator.getBoundingClientRect();
            const pairCount = Math.ceil(pagesData.length / 2);
            if (pairCount <= 1) return;
            let x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            let index = Math.floor((x / rect.width) * pairCount);
            index = Math.min(index, pairCount - 1); 
            if (currentP !== index * 2) { currentP = index * 2; updateView(); }
        }

        indicator.addEventListener('pointerdown', e => { isScrubbing = true; document.getElementById('app').style.transitionDuration = '0s'; indicator.setPointerCapture(e.pointerId); handleScrub(e); });
        indicator.addEventListener('pointermove', e => { if (isScrubbing) handleScrub(e); });
        indicator.addEventListener('pointerup', e => { isScrubbing = false; document.getElementById('app').style.transitionDuration = ''; indicator.releasePointerCapture(e.pointerId); save(); });

        initApp();
    </script>
</body>
</html>
