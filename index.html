<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Bujo - Spread 📖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overflow: hidden; background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        [contenteditable]:empty::before { content: "\FEFF"; }
        .bullet-block { animation: slideIn 0.15s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        
        /* ✨ Drag, Selection & Text Wrap Logic */
        .bullet-block { cursor: default; }
        .bullet-handle { cursor: grab; user-select: none; }
        .bullet-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.3; }
        
        /* Word wrapping and hyphenation rules */
        .bullet-text { 
            cursor: text; 
            user-select: text; 
            word-break: break-word; 
            -webkit-hyphens: auto; 
            hyphens: auto; 
        }


    </style>
</head>
<body class="text-zinc-800">

    <div id="app" class="flex transition-transform duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] w-full h-screen will-change-transform">
    </div>

    <div id="page-indicator" class="fixed bottom-2 left-1/2 -translate-x-1/2 flex gap-3 z-50 p-4 cursor-grab active:cursor-grabbing touch-none"></div>
    <script>
        const BULLETS = { task: '•', completed: '✕', migrated: '>', scheduled: '<', event: '○', note: '-' };
        const CYCLE = ['task', 'completed', 'migrated', 'scheduled', 'event', 'note'];

        // 🧠 State Management with Last Page Memory
        let pagesData = JSON.parse(localStorage.getItem('bujo_pages_spread')) || [[createBlock()], [createBlock()]];
        let storedPage = parseInt(localStorage.getItem('bujo_last_page'));
        let currentP = isNaN(storedPage) ? 0 : storedPage;

        function createBlock(text = '', depth = 0, type = 'text') { 
            return { id: crypto.randomUUID(), type, text, depth }; 
        }
        
        function save() { 
            localStorage.setItem('bujo_pages_spread', JSON.stringify(pagesData)); 
            localStorage.setItem('bujo_last_page', currentP);
            renderIndicator(); 
        }

        /**
         * 🎨 RENDERING
         */
        function renderApp() {
            if (pagesData.length % 2 !== 0) pagesData.push([createBlock()]);

            const app = document.getElementById('app');
            app.innerHTML = pagesData.map((p, i) => `
                <div class="w-[50vw] h-screen flex-shrink-0 relative flex justify-center ${i % 2 === 0 ? 'border-r border-dashed border-zinc-300' : ''}">
                    <div class="w-full h-full overflow-y-auto px-10 pt-24 pb-32 flex justify-center">
                        <div class="w-full max-w-md bujo-list relative min-h-[50vh]" data-idx="${i}"></div>
                    </div>
                    <div class="absolute bottom-8 left-0 w-full text-center text-zinc-400 text-sm font-mono tracking-widest select-none pointer-events-none">${i + 1}</div>
                </div>
            `).join('');
            
            pagesData.forEach((_, i) => renderPage(i));
            updateView();
        }

        function renderPage(pIdx) {
            const list = document.querySelector(`.bujo-list[data-idx="${pIdx}"]`);
            if(!list) return;
            
            list.innerHTML = pagesData[pIdx].map(b => {
                let textClass = "flex-1 outline-none whitespace-pre-wrap min-h-[1.5rem] bullet-text transition-all duration-300 ";
                
                if (b.type === 'h1') textClass += "text-4xl font-bold mt-6 mb-2 ";
                else if (b.type === 'h2') textClass += "text-3xl font-bold mt-5 mb-2 ";
                else if (b.type === 'h3') textClass += "text-2xl font-bold mt-4 mb-1 ";
                else if (b.type === 'h4') textClass += "text-xl font-semibold mt-3 mb-1 ";
                else if (b.type === 'h5') textClass += "text-lg font-semibold mt-2 mb-1 ";
                else if (b.type === 'h6') textClass += "text-base font-semibold uppercase tracking-wider mt-2 mb-1 text-zinc-500 ";
                else textClass += "text-[1.05rem] leading-relaxed ";

                if (b.type === 'completed') textClass += "line-through text-zinc-400 opacity-60";
                else if (['migrated', 'scheduled'].includes(b.type)) textClass += "italic text-zinc-500";

                const isBullet = CYCLE.includes(b.type);
                const symbol = isBullet ? BULLETS[b.type] : ''; 

                return `
                <div class="relative flex items-start mb-2 bullet-block group" data-id="${b.id}" style="margin-left: ${b.depth * 28}px">
                    <div class="absolute -left-8 top-0.5 w-7 h-7 flex items-center justify-center bullet-handle ${isBullet ? 'opacity-40 text-zinc-500' : 'opacity-0 text-zinc-300'} group-hover:opacity-100 hover:!text-black font-bold transition-all" 
                         onmousedown="this.parentElement.setAttribute('draggable', 'true')" 
                         onmouseup="this.parentElement.setAttribute('draggable', 'false')"
                         onmouseleave="this.parentElement.setAttribute('draggable', 'false')">
                        ${symbol || '::'} 
                    </div>
                    <div class="${textClass}" contenteditable="true" spellcheck="false">${b.text}</div>
                </div>`;
            }).join('');
        }

        function updateView() {
            document.getElementById('app').style.transform = `translateX(-${currentP * 50}vw)`;
            localStorage.setItem('bujo_last_page', currentP);
            renderIndicator();
        }

        function renderIndicator() {
            const pairCount = Math.ceil(pagesData.length / 2);
            const activePair = Math.floor(currentP / 2);
            document.getElementById('page-indicator').innerHTML = Array.from({length: pairCount}).map((_, i) => 
                `<span onclick="jumpToPair(${i})" class="pointer-events-none h-2 rounded-full transition-all duration-300 ${i === activePair ? 'w-6 bg-zinc-800' : 'w-2 bg-zinc-300 hover:bg-zinc-400'}"></span>`
            ).join('');
        }

        function jumpToPair(pairIdx) {
            currentP = pairIdx * 2;
            updateView();
            save();
        }

        function changePage(dir) {
            const nextP = currentP + dir * 2;
            if (nextP < 0) return;
            if (nextP >= pagesData.length) {
                pagesData.push([createBlock()], [createBlock()]);
                renderApp();
            }
            currentP = nextP;
            updateView(); save();
        }

        function cycleType(block, pIdx) {
            let currentIndex = CYCLE.indexOf(block.type);
            if (currentIndex === -1) block.type = 'task'; 
            else block.type = CYCLE[(currentIndex + 1) % CYCLE.length];
            save(); renderPage(pIdx); focusBlock(block.id);
        }

        function focusBlock(id, atStart = false) {
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${id}"] .bullet-text`);
                if (!el) return;
                el.focus();
                const sel = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(atStart);
                sel.removeAllRanges(); sel.addRange(range);
            }, 10);
        }

        function getCaretPos(el) {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const r = sel.getRangeAt(0).cloneRange();
                r.selectNodeContents(el);
                r.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
                return r.toString().length;
            }
            return 0;
        }

        /**
         * 🕹️ EVENTS
         */
        document.addEventListener('input', e => {
            if(e.target.classList.contains('bullet-text')) {
                const pIdx = parseInt(e.target.closest('.bujo-list').dataset.idx);
                const block = pagesData[pIdx].find(b => b.id === e.target.closest('.bullet-block').dataset.id);
                block.text = e.target.textContent;

                const mdMap = {'* ': 'task', 'x ': 'completed', '> ': 'migrated', '< ': 'scheduled', 'o ': 'event', '- ': 'note', '# ': 'h1', '## ': 'h2'};
                for (const [prefix, type] of Object.entries(mdMap)) {
                    if (e.target.textContent.startsWith(prefix)) {
                        block.type = type;
                        block.text = e.target.textContent.substring(prefix.length);
                        save(); renderPage(pIdx); focusBlock(block.id, true);
                        break;
                    }
                }
                save();
            }
        });

        document.addEventListener('keydown', e => {
            const isEditing = e.target.classList.contains('bullet-text');
            
            // 🚪 Global Mode Listeners
            if (!isEditing) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); }
                if (e.key === 'ArrowRight') { e.preventDefault(); changePage(1); }
                return;
            }

            // 🚫 Escape Edit Mode
            if (e.key === 'Escape') {
                e.preventDefault();
                e.target.blur();
                return;
            }

            const pIdx = parseInt(e.target.closest('.bujo-list').dataset.idx);
            const blockDiv = e.target.closest('.bullet-block');
            const pageList = pagesData[pIdx];
            const bIdx = pageList.findIndex(b => b.id === blockDiv.dataset.id);
            const block = pageList[bIdx];

            // ⌨️ Alt + Enter : Next Page
            if (e.altKey && e.key === 'Enter') {
                e.preventDefault();
                changePage(1);
                return;
            }

            // ⌨️ Ctrl + Enter : Cycle Type
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                cycleType(block, pIdx);
                return;
            }

            // ⌨️ Enter : New Block
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const caret = getCaretPos(e.target);
                const txt = e.target.textContent;
                block.text = txt.slice(0, caret);
                const newType = block.type.startsWith('h') ? 'text' : block.type;
                const newBlock = createBlock(txt.slice(caret), block.depth, newType);
                pageList.splice(bIdx + 1, 0, newBlock);
                save(); renderPage(pIdx); focusBlock(newBlock.id, true);
                return;
            }

            // ⌨️ Tab : Indent
            if (e.key === 'Tab') {
                e.preventDefault();
                block.depth = Math.max(0, Math.min(4, block.depth + (e.shiftKey ? -1 : 1)));
                save(); renderPage(pIdx); focusBlock(block.id);
                return;
            }
            
            // ⌨️ Backspace : Remove / Merge blocks smoothly
            if (e.key === 'Backspace' && getCaretPos(e.target) === 0) {
                if (block.type !== 'text') {
                    e.preventDefault(); block.type = 'text'; save(); renderPage(pIdx); focusBlock(block.id);
                } else if (bIdx > 0) {
                    e.preventDefault();
                    const prevBlock = pageList[bIdx - 1];
                    const prevLength = prevBlock.text.length;
                    prevBlock.text += block.text;
                    pageList.splice(bIdx, 1);
                    save(); renderPage(pIdx);
                    
                    // Carefully refocus merged node
                    setTimeout(() => {
                        const el = document.querySelector(`[data-id="${prevBlock.id}"] .bullet-text`);
                        if (!el) return;
                        el.focus();
                        const sel = window.getSelection();
                        const range = document.createRange();
                        if (el.firstChild) {
                            range.setStart(el.firstChild, prevLength);
                        } else {
                            range.setStart(el, 0);
                        }
                        range.collapse(true);
                        sel.removeAllRanges(); sel.addRange(range);
                    }, 10);
                }
            }

            // ⌨️ Up/Down Arrows : Smooth block navigation
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                const sel = window.getSelection();
                if (!sel.rangeCount) return;
                
                const range = sel.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                const elRect = e.target.getBoundingClientRect();
                
                // If cursor is near top of element, allow jump up
                if (e.key === 'ArrowUp' && (rect.top - elRect.top < 24)) {
                    const prev = blockDiv.previousElementSibling;
                    if (prev) { e.preventDefault(); focusBlock(prev.dataset.id, false); }
                } 
                // If cursor is near bottom of element, allow jump down
                else if (e.key === 'ArrowDown' && (elRect.bottom - rect.bottom < 24)) {
                    const next = blockDiv.nextElementSibling;
                    if (next) { e.preventDefault(); focusBlock(next.dataset.id, true); }
                }
            }
        });

        // ✋ Bullet-Only Drag & Drop
        let draggedId = null;
        document.addEventListener('dragstart', e => {
            const block = e.target.closest('.bullet-block');
            if(block && block.getAttribute('draggable') === 'true') {
                draggedId = block.dataset.id;
                setTimeout(() => block.classList.add('dragging'), 0);
            } else { 
                e.preventDefault(); 
            }
        });

        document.addEventListener('dragover', e => {
            e.preventDefault();
            const target = e.target.closest('.bullet-block');
            if(target && target.dataset.id !== draggedId) {
                const rect = target.getBoundingClientRect();
                const draggedEl = document.querySelector(`[data-id="${draggedId}"]`);
                if (e.clientY > rect.top + rect.height / 2) target.parentNode.insertBefore(draggedEl, target.nextSibling);
                else target.parentNode.insertBefore(draggedEl, target);
            }
        });

        document.addEventListener('dragend', () => {
            const el = document.querySelector(`[data-id="${draggedId}"]`);
            if(el) {
                el.classList.remove('dragging');
                el.setAttribute('draggable', 'false'); // Reset after drag
            }
            const allBlocks = pagesData.flat();
            pagesData = pagesData.map((_, i) => {
                const list = document.querySelector(`.bujo-list[data-idx="${i}"]`);
                return Array.from(list.children).map(c => allBlocks.find(b => b.id === c.dataset.id));
            });
            save(); draggedId = null;
        });


        // 🎚️ Smooth Scrubbing Logic for Classic Dots
const indicator = document.getElementById('page-indicator');
let isScrubbing = false;

indicator.addEventListener('pointerdown', e => {
    isScrubbing = true;
    document.getElementById('app').style.transitionDuration = '0s'; // ⚡ Snap instantly while dragging
    indicator.setPointerCapture(e.pointerId);
    handleScrub(e);
});

indicator.addEventListener('pointermove', e => {
    if (!isScrubbing) return;
    handleScrub(e);
});

indicator.addEventListener('pointerup', e => {
    isScrubbing = false;
    document.getElementById('app').style.transitionDuration = ''; // 🌊 Restore smooth animation
    indicator.releasePointerCapture(e.pointerId);
    save();
});

function handleScrub(e) {
    const rect = indicator.getBoundingClientRect();
    const pairCount = Math.ceil(pagesData.length / 2);
    if (pairCount <= 1) return;

    // Map mouse X position to the correct page index
    let x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
    let index = Math.floor((x / rect.width) * pairCount);
    index = Math.min(index, pairCount - 1); // Prevent out of bounds

    if (currentP !== index * 2) {
        currentP = index * 2;
        updateView();
    }
}

        renderApp();
    </script>
</body>
</html>
