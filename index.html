<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Bujo - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ✨ Essential overrides */
        body { overflow: hidden; background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        [contenteditable]:empty::before { content: "\FEFF"; }
        .bullet-block { animation: slideIn 0.15s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-zinc-800 selection:bg-zinc-200">

    <div id="app" class="flex transition-transform duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] w-full h-screen will-change-transform">
        </div>

    <div id="page-indicator" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex gap-3 z-50"></div>

    <script>
        /**
         * 🛠️ CORE CONFIGURATION & STATE 
         */
        const SYMBOLS = { task: { open: '•', completed: '✕', migrated: '>', scheduled: '<' }, event: { open: '○' }, note: { open: '-' }, priority: { open: '!' }, question: { open: '?' } };
        const INSTANT = { '.': 'task', 'o': 'event', '-': 'note', '!': 'priority', '?': 'question' };
        const CYCLE = ['open', 'completed', 'migrated', 'scheduled'];

        let pagesData = JSON.parse(localStorage.getItem('bujo_pages_pro')) || [[createBlock()]];
        let currentP = 0;

        function createBlock(text = '', depth = 0, type = 'task') { 
            return { id: crypto.randomUUID(), type, status: 'open', text, depth }; 
        }
        
        function save() { 
            localStorage.setItem('bujo_pages_pro', JSON.stringify(pagesData)); 
            renderIndicator(); 
        }

        /**
         * 🎨 DOM RENDERING (TAILWIND POWERED)
         */
        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = pagesData.map((p, i) => `
                <div class="w-screen h-screen flex-shrink-0 flex justify-center px-6 pt-24 pb-32 overflow-y-auto">
                    <div class="w-full max-w-lg bujo-list relative" data-idx="${i}"></div>
                </div>
            `).join('');
            pagesData.forEach((_, i) => renderPage(i));
            updateView();
        }

        function renderPage(pIdx) {
            const list = document.querySelector(`.bujo-list[data-idx="${pIdx}"]`);
            if(!list) return;
            
            list.innerHTML = pagesData[pIdx].map(b => {
                let textClass = "flex-1 outline-none text-[1.05rem] leading-relaxed bullet-text transition-all duration-300 ";
                if (b.status === 'completed') textClass += "line-through text-zinc-400 opacity-60";
                else if (['migrated', 'scheduled'].includes(b.status)) textClass += "italic text-zinc-500";

                return `
                <div class="relative flex items-start mb-3 bullet-block group" data-id="${b.id}" style="margin-left: ${b.depth * 28}px">
                    <div class="absolute -left-8 top-0.5 w-7 h-7 flex items-center justify-center cursor-grab opacity-40 group-hover:opacity-100 group-hover:text-black text-zinc-500 font-bold transition-transform active:scale-75 bullet-control" draggable="true">
                        ${SYMBOLS[b.type][b.status] || SYMBOLS[b.type].open}
                    </div>
                    <div class="${textClass}" contenteditable="true" spellcheck="false">${b.text}</div>
                </div>`;
            }).join('');
        }

        function updateView() {
            document.getElementById('app').style.transform = `translateX(-${currentP * 100}vw)`;
            renderIndicator();
        }

        function renderIndicator() {
            document.getElementById('page-indicator').innerHTML = pagesData.map((_, i) => 
                `<span class="h-2 rounded-full transition-all duration-300 ${i === currentP ? 'w-6 bg-zinc-800' : 'w-2 bg-zinc-300'}"></span>`
            ).join('');
        }

        function changePage(dir) {
            currentP += dir;
            if (currentP < 0) currentP = 0;
            if (currentP >= pagesData.length) { pagesData.push([createBlock()]); renderApp(); }
            updateView(); save();
        }

        function focusBlock(id, atStart = false) {
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${id}"] .bullet-text`);
                if (!el) return;
                el.focus();
                const range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(atStart);
                const sel = window.getSelection();
                sel.removeAllRanges(); sel.addRange(range);
            }, 10);
        }

        function getCaretPos(el) {
            let caret = 0;
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const r = sel.getRangeAt(0).cloneRange();
                r.selectNodeContents(el);
                r.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
                caret = r.toString().length;
            }
            return caret;
        }

        /**
         * 🕹️ EVENT DELEGATION (WRITING LESS CODE)
         */
        // 1. Inputs ✍️
        document.addEventListener('input', e => {
            if(e.target.classList.contains('bullet-text')) {
                const blockDiv = e.target.closest('.bullet-block');
                const pIdx = parseInt(e.target.closest('.bujo-list').dataset.idx);
                pagesData[pIdx].find(b => b.id === blockDiv.dataset.id).text = e.target.textContent;
                save();
            }
        });

        // 2. Clicks (Status Cycle) 🔄
        document.addEventListener('click', e => {
            if(e.target.closest('.bullet-control')) {
                const pIdx = parseInt(e.target.closest('.bujo-list').dataset.idx);
                const block = pagesData[pIdx].find(b => b.id === e.target.closest('.bullet-block').dataset.id);
                if(block.type === 'task') {
                    block.status = CYCLE[(CYCLE.indexOf(block.status) + 1) % 4];
                    save(); renderPage(pIdx);
                }
            }
        });

        // 3. Keyboard Shortcuts & Navigation ⌨️
        document.addEventListener('keydown', e => {
            const isEditing = e.target.classList.contains('bullet-text');

            // 📖 Page Nav (Raw arrows if not editing, Alt+Arrows if editing)
            if (!isEditing && e.key === 'ArrowLeft') { changePage(-1); return; }
            if (!isEditing && e.key === 'ArrowRight') { changePage(1); return; }
            if (e.altKey && e.key === 'ArrowLeft') { e.preventDefault(); changePage(-1); return; }
            if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); changePage(1); return; }

            if (!isEditing) return;

            const blockDiv = e.target.closest('.bullet-block');
            const pIdx = parseInt(e.target.closest('.bujo-list').dataset.idx);
            const blockId = blockDiv.dataset.id;
            const pageList = pagesData[pIdx];
            const bIdx = pageList.findIndex(b => b.id === blockId);
            const block = pageList[bIdx];
            const caret = getCaretPos(e.target);

            // ⚡ Instant Symbols
            if (block.text === '' && e.key.length === 1 && INSTANT[e.key]) {
                e.preventDefault(); block.type = INSTANT[e.key]; block.status = 'open';
                save(); renderPage(pIdx); focusBlock(blockId); return;
            }

            // 🌟 Indent (Tab / Shift+Tab)
            if (e.key === 'Tab') {
                e.preventDefault();
                block.depth = Math.max(0, Math.min(4, block.depth + (e.shiftKey ? -1 : 1)));
                save(); renderPage(pIdx); focusBlock(blockId); return;
            }

            // ✂️ Split Text (Enter)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const txt = e.target.textContent;
                block.text = txt.slice(0, caret);
                const newBlock = createBlock(txt.slice(caret), block.depth, block.type);
                newBlock.status = block.status;
                pageList.splice(bIdx + 1, 0, newBlock);
                save(); renderPage(pIdx); focusBlock(newBlock.id, true); return;
            }

            // 🔙 Backspace outdent / delete
            if (e.key === 'Backspace' && caret === 0) {
                if (block.depth > 0) {
                    e.preventDefault(); block.depth--; 
                    save(); renderPage(pIdx); focusBlock(blockId); return;
                }
                if (block.text === '' && pageList.length > 1) {
                    e.preventDefault(); pageList.splice(bIdx, 1);
                    save(); renderPage(pIdx); 
                    focusBlock(pageList[Math.max(0, bIdx - 1)].id, false); return;
                }
            }

            // ⬆️⬇️ Up/Down Navigation & Reorder
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                const dir = e.key === 'ArrowUp' ? -1 : 1;
                if (bIdx + dir >= 0 && bIdx + dir < pageList.length) {
                    if (e.altKey) { // Move block up/down
                        [pageList[bIdx], pageList[bIdx+dir]] = [pageList[bIdx+dir], pageList[bIdx]];
                        save(); renderPage(pIdx); focusBlock(blockId);
                    } else { // Just move cursor
                        focusBlock(pageList[bIdx+dir].id);
                    }
                }
            }
        });

        // 4. Native Drag & Drop ✋
        let draggedId = null;
        document.addEventListener('dragstart', e => {
            if(e.target.classList.contains('bullet-control')) {
                draggedId = e.target.closest('.bullet-block').dataset.id;
                e.dataTransfer.effectAllowed = 'move';
            }
        });
        
        document.addEventListener('dragover', e => {
            e.preventDefault();
            const target = e.target.closest('.bullet-block');
            if(target && target.dataset.id !== draggedId && draggedId) {
                const list = target.parentNode;
                const draggedEl = document.querySelector(`[data-id="${draggedId}"]`);
                const rect = target.getBoundingClientRect();
                if (e.clientY > rect.top + rect.height / 2) list.insertBefore(draggedEl, target.nextSibling);
                else list.insertBefore(draggedEl, target);
            }
        });
        
        document.addEventListener('dragend', e => {
            if(draggedId) {
                const pIdx = parseInt(document.querySelector(`[data-id="${draggedId}"]`).closest('.bujo-list').dataset.idx);
                const list = document.querySelector(`.bujo-list[data-idx="${pIdx}"]`);
                const newOrderIds = Array.from(list.children).map(el => el.dataset.id);
                pagesData[pIdx].sort((a, b) => newOrderIds.indexOf(a.id) - newOrderIds.indexOf(b.id));
                save(); renderPage(pIdx); draggedId = null;
            }
        });

        // 🚀 Initialize
        renderApp();
    </script>
</body>
</html>
