<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalist Bujo - Spread 📖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { overflow-x: hidden; overflow-y: auto; background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      [contenteditable]:empty::before { content: "\FEFF"; }

      .bullet-block { animation: slideIn 0.15s ease-out forwards; cursor: default; }
      @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
      ::-webkit-scrollbar { display: none; }
      .bullet-handle { cursor: grab; user-select: none; }
      .bullet-handle:active { cursor: grabbing; }
      .dragging { opacity: 0.3; }
      .bullet-text { cursor: text; user-select: text; word-break: break-word; -webkit-hyphens: auto; hyphens: auto; }
      .region-content::-webkit-scrollbar { display: none; }

      .draggable-image { position: absolute; top: 0; left: 0; cursor: grab; max-width: 300px; filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.15)); user-select: none; transition: scale 0.2s ease, rotate 0.2s ease, opacity 0.2s ease; }
      .draggable-image:active { cursor: grabbing; }
      .draggable-image[data-locked="true"] { cursor: default; }
      .draggable-image[data-locked="true"]:active { cursor: default; }
      .layer-background { z-index: 10; }
      .layer-paper { z-index: 20; }
      .layer-sticker { z-index: 30; }
      .layer-floating { z-index: 40; }
      .layer-focus { z-index: 50; }
    </style>
  </head>
  <body class="text-zinc-800">
    <button id="sticker-toggle" class="fixed top-6 right-6 w-12 h-12 bg-white rounded-full shadow-lg text-2xl z-[60] hover:scale-110 transition-transform flex items-center justify-center border border-zinc-100">🎒</button>

    <div id="sticker-drawer" class="fixed top-0 right-0 w-80 h-screen bg-zinc-50 shadow-2xl z-[50] transform translate-x-full transition-transform duration-300 ease-out border-l border-zinc-200 p-6 overflow-y-auto">
      <h2 class="text-2xl font-bold mb-2 mt-16 text-zinc-800">Stickers 🌟</h2>
      <p class="text-xs text-zinc-500 mb-6 leading-relaxed">Double-click any floating image on your page to save it here! Or upload new ones directly 👇</p>
      <label class="block w-full cursor-pointer bg-zinc-800 text-white hover:bg-zinc-700 text-center py-3 rounded-lg font-semibold text-sm mb-6 transition-colors shadow-md">
        ➕ Upload Sticker
        <input type="file" id="sticker-upload" accept="image/*" class="hidden" />
      </label>
      <div id="sticker-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="app" class="flex transition-transform duration-500 ease-[cubic-bezier(0.2,0.8,0.2,1)] w-full min-h-screen will-change-transform relative items-start"></div>
    <div id="page-indicator" class="fixed bottom-2 left-1/2 -translate-x-1/2 flex gap-3 z-50 p-4 cursor-grab active:cursor-grabbing touch-none"></div>

    <script>
// ==========================================
// 1. CONSTANTS & CONFIGURATION
// ==========================================
const CONFIG = {
  BULLETS: { task: "•", completed: "✕", migrated: ">", scheduled: "<", event: "○", note: "-" },
  CYCLE: ["task", "completed", "migrated", "scheduled", "event", "note"],
  MD_MAP: { "* ": "task", "x ": "completed", "> ": "migrated", "< ": "scheduled", "o ": "event", "- ": "note", "# ": "h1", "## ": "h2", "### ": "h3", "#### ": "h4", "##### ": "h5", "###### ": "h6" },
  H_STYLES: { h1: "text-4xl font-bold mt-6 mb-2", h2: "text-3xl font-bold mt-5 mb-2", h3: "text-2xl font-bold mt-4 mb-1", h4: "text-xl font-semibold mt-3 mb-1", h5: "text-lg font-semibold mt-2 mb-1", h6: "text-base font-semibold uppercase tracking-wider mt-2 mb-1 text-zinc-500" },
  SAVE_TIMEOUT_MS: 500,
  LAYERS: ['background', 'paper', 'sticker', 'floating', 'focus'],
  OPACITIES: [1, 0.75, 0.5, 0.25],
  INDENT_PX: 28,
  MIN_REGION_SIZE: 50,
  KEY_JUMP_THRESHOLD: 24,
  MAX_DEPTH: 4
};

const DOM_IDS = {
  APP: "app",
  INDICATOR: "page-indicator",
  STICKER_TOGGLE: "sticker-toggle",
  STICKER_DRAWER: "sticker-drawer",
  STICKER_UPLOAD: "sticker-upload",
  STICKER_GRID: "sticker-grid",
  CONTEXT_MENU: "custom-context-menu"
};

// ==========================================
// 2. EVENT BUS (PUB/SUB)
// ==========================================
const EventBus = {
  listeners: {},
  on(event, callback) {
    if (!this.listeners[event]) this.listeners[event] = [];
    this.listeners[event].push(callback);
  },
  emit(event, payload) {
    if (this.listeners[event]) this.listeners[event].forEach(cb => cb(payload));
  }
};

const EVENTS = {
  STATE_UPDATED: "STATE_UPDATED",
  PAGE_CHANGED: "PAGE_CHANGED",
  SAVE_REQUESTED: "SAVE_REQUESTED",
  FORCE_RENDER: "FORCE_RENDER",
  APP_RENDERED: "APP_RENDERED",
  RENDER_INDICATOR: "RENDER_INDICATOR",
  BLOCK_UPDATED: "BLOCK_UPDATED",
  BLOCK_FOCUSED: "BLOCK_FOCUSED",
  STICKER_ADDED: "STICKER_ADDED",
  STICKER_REMOVED: "STICKER_REMOVED",
  IMAGE_SPAWNED: "IMAGE_SPAWNED",
  IMAGE_UPDATED: "IMAGE_UPDATED",
  IMAGE_REMOVED: "IMAGE_REMOVED",
  REGION_CREATED: "REGION_CREATED",
  REGION_DELETED: "REGION_DELETED",
  REGION_UPDATED: "REGION_UPDATED"
};

// ==========================================
// 3. PURE FUNCTIONS / HELPERS
// ==========================================
const Utils = {
  qs: s => document.querySelector(s),
  qsa: s => document.querySelectorAll(s),
  gid: id => document.getElementById(id),
  generateId: () => crypto.randomUUID(),
  clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
  calcRectOffset: (clientX, clientY, rect) => ({
    x: clientX - rect.left,
    y: clientY - rect.top
  }),
  isInsideRect: (clientX, clientY, rect) => clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom,
  isBetweenHorizontally: (clientX, rect) => clientX >= rect.left && clientX <= rect.right,
  findWrapperByCoords(wrappers, clientX) {
    return wrappers.find(w => this.isBetweenHorizontally(clientX, w.getBoundingClientRect())) || wrappers[0];
  },
  getBlockClasses(type) {
    const base = "flex-1 outline-none whitespace-pre-wrap min-h-[1.5rem] bullet-text transition-all duration-300";
    const typo = CONFIG.H_STYLES[type] || "text-[1.05rem] leading-relaxed";
    const extra = type === "completed" ? "line-through text-zinc-400 opacity-60" : ["migrated", "scheduled"].includes(type) ? "italic text-zinc-500" : "";
    return `${base} ${typo} ${extra}`.trim();
  },
  getHandleClasses(isB) {
    return `absolute -left-8 top-0.5 w-7 h-7 flex items-center justify-center bullet-handle ${isB ? "opacity-40 text-zinc-500" : "opacity-0 text-zinc-300"} group-hover:opacity-100 hover:!text-black font-bold transition-all`;
  },
  getNextType(currentType) {
    const idx = CONFIG.CYCLE.indexOf(currentType);
    return idx === -1 ? "task" : CONFIG.CYCLE[(idx + 1) % CONFIG.CYCLE.length];
  },
  getNextLayer(currentLayer, dir) {
    const idx = CONFIG.LAYERS.indexOf(currentLayer);
    return CONFIG.LAYERS[this.clamp(idx + dir, 0, CONFIG.LAYERS.length - 1)];
  },
  getNextOpacity(currentOpacity) {
    const idx = CONFIG.OPACITIES.indexOf(currentOpacity ?? 1);
    return CONFIG.OPACITIES[(idx + 1) % CONFIG.OPACITIES.length];
  }
};

// ==========================================
// 4. DATA STORAGE
// ==========================================
const api = window.electronAPI;
const memFs = new Map();

const FileSystemAPI = {
  readJson: async (path) => api ? await api.readJson(path) : (memFs.get(path) ?? null),
  writeJsonAtomic: async (path, data) => api ? await api.writeJsonAtomic(path, data) : memFs.set(path, data),
  trashJson: async (path) => api ? await api.trashJson(path) : memFs.delete(path),
};

const StorageManager = {
  saveTimeout: null, isSaving: false, needsSave: false,
  init() {
    EventBus.on(EVENTS.SAVE_REQUESTED, (forceRender) => this.requestSave(forceRender));
  },
  async loadNotebookMeta() {
    const m = await FileSystemAPI.readJson("meta.json") || {};
    return { version: 4, currentP: 0, pageOrder: [], scrolls: [], stickers: [], placedImages: [], regions: [], lines: [], ...m };
  },
  async executeSave(forceRender = false) {
    if (this.isSaving) return (this.needsSave = true);
    this.isSaving = true; this.needsSave = false;
    try {
      const layoutChanged = await StateManager.cleanEmptySpreads();
      const p = StateManager.currentP;
      const { pageOrder, regions } = StateManager.meta;

      if (pageOrder[p]) await FileSystemAPI.writeJsonAtomic(`pages/${pageOrder[p]}.json`, StateManager.pages[p]);

      for (const region of regions) {
        if (StateManager.regionPages[region.pageId]) {
          await FileSystemAPI.writeJsonAtomic(`pages/${region.pageId}.json`, StateManager.regionPages[region.pageId]);
        }
      }

      StateManager.meta.currentP = StateManager.currentP;
      await FileSystemAPI.writeJsonAtomic("meta.json", StateManager.meta);

      if (layoutChanged || forceRender) EventBus.emit(EVENTS.FORCE_RENDER);
      else EventBus.emit(EVENTS.RENDER_INDICATOR);
    } finally {
      this.isSaving = false;
      if (this.needsSave) this.executeSave();
    }
  },
  requestSave(forceRender = false) {
    clearTimeout(this.saveTimeout);
    this.saveTimeout = setTimeout(() => this.executeSave(forceRender), CONFIG.SAVE_TIMEOUT_MS);
  },
};

// ==========================================
// 5. STATE MANAGEMENT
// ==========================================
const StateManager = {
  meta: null, pages: [], regionPages: {}, currentP: 0, blockMap: new Map(),
  
  createBlock: (text = "", depth = 0, type = "text") => ({ id: Utils.generateId(), type, text, depth }),
  
  async init() {
    this.meta = await StorageManager.loadNotebookMeta();
    if (this.meta.pageOrder.length === 0) {
      this.meta.pageOrder.push(`page-${Utils.generateId()}`, `page-${Utils.generateId()}`);
      await FileSystemAPI.writeJsonAtomic("meta.json", this.meta);
    }
    this.pages = await Promise.all(this.meta.pageOrder.map(id =>
      FileSystemAPI.readJson(`pages/${id}.json`).then(d => d || [this.createBlock()])
    ));
    
    this.pages.forEach((pageBlocks, i) => {
      const hasContent = pageBlocks.length > 1 || (pageBlocks[0] && pageBlocks[0].text.trim() !== "");
      if (hasContent && !this.meta.regions.some(r => r.surfaceId === this.meta.pageOrder[i])) {
        const regionPageId = `page-${Utils.generateId()}`;
        this.meta.regions.push({
          id: Utils.generateId(), surfaceId: this.meta.pageOrder[i], x: 50, y: 100, width: 400, height: 500, pageId: regionPageId
        });
        this.regionPages[regionPageId] = [...pageBlocks];
        this.pages[i] = [this.createBlock()];
      }
    });

    await Promise.all(this.meta.regions.map(async r => {
      if (!this.regionPages[r.pageId]) {
        this.regionPages[r.pageId] = await FileSystemAPI.readJson(`pages/${r.pageId}.json`) || [this.createBlock()];
      }
    }));
    
    this.currentP = this.meta.currentP || 0;
    this.rebuildIndex();
  },

  rebuildIndex() {
    this.blockMap.clear();
    this.pages.forEach((page, pIdx) => page.forEach((block, bIdx) => this.blockMap.set(block.id, { pIdx, bIdx, block })));
    Object.entries(this.regionPages).forEach(([pageId, pageBlocks]) => {
      pageBlocks.forEach((block, bIdx) => this.blockMap.set(block.id, { isRegion: true, pageId, bIdx, block }));
    });
  },

  getBlockCoords: (id) => StateManager.blockMap.get(id) || null,

  async cleanEmptySpreads() {
    let changed = false;
    while (this.pages.length > 1 && (this.pages.length - 1) !== this.currentP) {
      const i = this.pages.length - 1;
      const pId = this.meta.pageOrder[i];
      const isEmpty = (p, pId) => p && p.every(b => b.text.trim() === "" && b.type === "text") && !this.meta.placedImages.some(img => img.pageId === pId) && !this.meta.regions.some(r => r.surfaceId === pId);
      if (isEmpty(this.pages[i], pId)) {
        await FileSystemAPI.trashJson(`pages/${pId}.json`);
        this.pages.splice(i, 1); this.meta.pageOrder.splice(i, 1); this.meta.scrolls.splice(i, 1);
        changed = true;
      } else break;
    }
    if (this.currentP >= this.pages.length) { this.currentP = Math.max(0, this.pages.length - 1); changed = true; }
    if (changed) this.rebuildIndex();
    return changed;
  },

  async ensureEnoughPages() {
    if (this.currentP >= this.pages.length) {
      this.meta.pageOrder.push(`page-${Utils.generateId()}`);
      this.pages.push([this.createBlock()]);
      this.rebuildIndex();
      await FileSystemAPI.writeJsonAtomic("meta.json", this.meta);
      return true;
    }
    return false;
  },

  updateBlock(id, updates) {
    const c = this.getBlockCoords(id);
    if (c) {
      Object.assign(c.block, updates);
      EventBus.emit(EVENTS.BLOCK_UPDATED, { block: c.block });
      EventBus.emit(EVENTS.SAVE_REQUESTED);
    }
  },

  addBlock(newBlock, idAfter) {
    const c = this.getBlockCoords(idAfter);
    if (!c) return;
    const { pIdx, pageId, isRegion, bIdx } = c;
    if (isRegion) this.regionPages[pageId].splice(bIdx + 1, 0, newBlock);
    else this.pages[pIdx].splice(bIdx + 1, 0, newBlock);
    this.rebuildIndex();
    EventBus.emit(EVENTS.SAVE_REQUESTED);
  },

  removeBlock(id) {
    const c = this.getBlockCoords(id);
    if (!c) return;
    const { pIdx, pageId, isRegion, bIdx } = c;
    if (isRegion) this.regionPages[pageId].splice(bIdx, 1);
    else this.pages[pIdx].splice(bIdx, 1);
    this.rebuildIndex();
    EventBus.emit(EVENTS.SAVE_REQUESTED);
  },

  moveBlockDOM(id, targetId, insertAfter) {
    const src = this.getBlockCoords(id), tgt = this.getBlockCoords(targetId);
    if (!src || !tgt) return;
    
    const srcArray = src.isRegion ? this.regionPages[src.pageId] : this.pages[src.pIdx];
    const tgtArray = tgt.isRegion ? this.regionPages[tgt.pageId] : this.pages[tgt.pIdx];
    
    const [moved] = srcArray.splice(src.bIdx, 1);
    const sameArray = (src.isRegion === tgt.isRegion) && (src.isRegion ? src.pageId === tgt.pageId : src.pIdx === tgt.pIdx);
    let iIdx = tgt.bIdx - (sameArray && src.bIdx < tgt.bIdx ? 1 : 0) + (insertAfter ? 1 : 0);
    
    tgtArray.splice(iIdx, 0, moved);
    this.rebuildIndex();
    
    EventBus.emit(EVENTS.FORCE_RENDER);
    EventBus.emit(EVENTS.SAVE_REQUESTED);
  },
  
  async changePage(dirOrIdx, isRelative = true) {
    const nextP = isRelative ? this.currentP + dirOrIdx : dirOrIdx;
    if (nextP < 0) return;
    this.currentP = nextP;
    const needsRender = await this.ensureEnoughPages();
    needsRender ? EventBus.emit(EVENTS.FORCE_RENDER) : EventBus.emit(EVENTS.PAGE_CHANGED);
    EventBus.emit(EVENTS.SAVE_REQUESTED);
  }
};

// ==========================================
// 6. UI COMPONENTS (Rendering logic)
// ==========================================
const UI = {
  renderStickerDrawer(stickers) {
    const grid = Utils.gid(DOM_IDS.STICKER_GRID);
    if (!stickers.length) {
      grid.innerHTML = `<div class="col-span-2 text-center text-sm text-zinc-400 mt-4">No stickers saved yet! 😿</div>`;
      return;
    }
    grid.innerHTML = "";
    stickers.forEach(s => {
      const div = document.createElement("div");
      div.className = "sticker-item cursor-pointer group flex items-center justify-center p-2 bg-white rounded-lg shadow-sm border border-zinc-100 hover:shadow-md hover:-translate-y-1 transition-all";
      div.dataset.stickerId = s.id;
      div.draggable = true;
      div.ondragstart = (e) => e.dataTransfer.setData("application/json", JSON.stringify({ type: "sticker", src: s.src }));
      div.onclick = () => EventBus.emit(EVENTS.IMAGE_SPAWNED, { src: s.src });
      div.innerHTML = `<img src="${s.src}" draggable="false" class="max-w-full max-h-24 object-contain filter drop-shadow-sm group-hover:drop-shadow-md">`;
      grid.appendChild(div);
    });
  },

  renderContextMenu(x, y, items) {
    this.hideContextMenu();
    const menu = document.createElement("div");
    menu.id = DOM_IDS.CONTEXT_MENU;
    menu.className = "fixed bg-white border border-zinc-200 shadow-xl rounded-md py-1 z-[100] w-48";
    menu.style.left = `${x}px`;
    menu.style.top = `${y}px`;
    
    items.forEach(item => {
      const btn = document.createElement("button");
      btn.className = `w-full text-left px-3 py-1.5 hover:bg-zinc-100 text-sm ${item.danger ? 'text-red-600' : 'text-zinc-800'}`;
      btn.innerHTML = item.label;
      btn.onclick = (e) => {
        e.stopPropagation();
        item.action();
        this.hideContextMenu();
      };
      menu.appendChild(btn);
    });
    document.body.appendChild(menu);
    setTimeout(() => document.addEventListener("click", this.hideContextMenuBound), 0);
    setTimeout(() => document.addEventListener("contextmenu", this.hideContextMenuBound), 0);
  },
  
  hideContextMenuBound: () => UI.hideContextMenu(),
  hideContextMenu() {
    const menu = Utils.gid(DOM_IDS.CONTEXT_MENU);
    if (menu) menu.remove();
    document.removeEventListener("click", UI.hideContextMenuBound);
    document.removeEventListener("contextmenu", UI.hideContextMenuBound);
  },

  generateBlockHTML(b) {
    const isB = CONFIG.CYCLE.includes(b.type);
    const classes = Utils.getBlockClasses(b.type);
    const handleClasses = Utils.getHandleClasses(isB);
    const symbol = isB ? CONFIG.BULLETS[b.type] : "::";
    return `<div class="relative flex items-start mb-2 bullet-block group" data-id="${b.id}" style="margin-left: ${b.depth * CONFIG.INDENT_PX}px">
      <div class="${handleClasses}" draggable="false">${symbol}</div>
      <div class="${classes}" contenteditable="true" spellcheck="false">${b.text}</div>
    </div>`;
  },

  updateBlockDOM(block) {
    const blockEl = Utils.qs(`[data-id="${block.id}"]`);
    if (!blockEl) return;
    blockEl.style.marginLeft = `${block.depth * CONFIG.INDENT_PX}px`;
    const isB = CONFIG.CYCLE.includes(block.type);
    const handle = blockEl.querySelector(".bullet-handle");
    handle.className = Utils.getHandleClasses(isB);
    handle.innerHTML = isB ? CONFIG.BULLETS[block.type] : "::";
    const textEl = blockEl.querySelector(".bullet-text");
    textEl.className = Utils.getBlockClasses(block.type);
    if (textEl.textContent !== block.text) textEl.textContent = block.text;
  },

  generateRegionBoxHTML(r) {
    return `
      <div class="region-header h-5 bg-transparent cursor-grab active:cursor-grabbing rounded-t-lg flex items-center px-2 hover:bg-black/5 transition-colors group">
        <div class="flex gap-1 opacity-20 group-hover:opacity-60 transition-opacity pointer-events-none">
          <div class="w-1.5 h-1.5 rounded-full bg-zinc-600"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-zinc-600"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-zinc-600"></div>
        </div>
      </div>
      <!-- 🛠️ THE FIX: Replaced p-4 with py-4 pr-4 pl-10 -->
      <div class="region-content flex-1 overflow-y-auto py-4 pr-4 pl-10 cursor-text" style="touch-action: pan-y;">
        <div class="bujo-list min-h-full" data-region-page-id="${r.pageId}"></div>
      </div>
      <div class="region-resizer absolute bottom-0 right-0 w-5 h-5 cursor-se-resize flex items-end justify-end p-1 opacity-0 hover:opacity-100 transition-opacity">
        <div class="w-2 h-2 border-r-2 border-b-2 border-zinc-400 rounded-sm pointer-events-none"></div>
      </div>
    `;
  },
  
  createImageDOM(data, src) {
    const img = document.createElement("img");
    img.src = src;
    img.className = `draggable-image layer-${data.layerBucket || 'sticker'}`;
    img.dataset.imgId = data.id;
    img.dataset.pageId = data.pageId;
    if (data.rotation) img.style.rotate = `${data.rotation}deg`;
    if (data.opacity !== undefined) img.style.opacity = data.opacity;
    if (data.locked) img.dataset.locked = "true";
    return img;
  },

  updateImageDOM(img, data) {
    img.style.left = `${data.left || 0}px`;
    img.style.top = `${data.top || 0}px`;
    img.style.transform = 'none';
  }
};

// ==========================================
// 7. CORE MANAGERS (Listening to Events)
// ==========================================
const SelectionManager = {
  init() {
    EventBus.on(EVENTS.BLOCK_FOCUSED, ({ id, offset, atEnd }) => this.focusBlock(id, offset, atEnd));
  },
  getCaretPos(el) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return 0;
    const r = sel.getRangeAt(0).cloneRange();
    r.selectNodeContents(el); r.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
    return r.toString().length;
  },
  focusBlock(id, offset = 0, atEnd = false) {
    const el = Utils.qs(`[data-id="${id}"] .bullet-text`);
    if (!el) return;
    el.focus();
    const range = document.createRange(), sel = window.getSelection();
    if (atEnd) {
      range.selectNodeContents(el); range.collapse(false);
    } else if (el.firstChild?.nodeType === Node.TEXT_NODE) {
      range.setStart(el.firstChild, Math.min(offset, el.firstChild.length)); range.collapse(true);
    } else {
      range.setStart(el, 0); range.collapse(true);
    }
    sel.removeAllRanges(); sel.addRange(range);
  }
};

const StickerBookManager = {
  isOpen: false,
  init() {
    const drawer = Utils.gid(DOM_IDS.STICKER_DRAWER);
    Utils.gid(DOM_IDS.STICKER_TOGGLE).addEventListener("click", () => {
      this.isOpen = !this.isOpen;
      drawer.classList.toggle("translate-x-full", !this.isOpen);
    });
    Utils.gid(DOM_IDS.STICKER_UPLOAD).addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => this.saveSticker(ev.target.result);
      reader.readAsDataURL(file);
    });
    
    EventBus.on(EVENTS.STICKER_ADDED, ({ src }) => this.saveSticker(src));
    EventBus.on(EVENTS.STICKER_REMOVED, ({ id }) => this.removeSticker(id));
    this.render();
  },
  async saveSticker(base64Src) {
    const id = Utils.generateId();
    await FileSystemAPI.writeJsonAtomic(`images/sticker-${id}.json`, { src: base64Src });
    StateManager.meta.stickers.push(id);
    EventBus.emit(EVENTS.SAVE_REQUESTED);
    this.render();
  },
  async removeSticker(id) {
    const idx = StateManager.meta.stickers.indexOf(id);
    if (idx !== -1) {
      StateManager.meta.stickers.splice(idx, 1);
      EventBus.emit(EVENTS.SAVE_REQUESTED);
      this.render();
      await FileSystemAPI.trashJson(`images/sticker-${id}.json`);
    }
  },
  async render() {
    const promises = StateManager.meta.stickers.map(async id => {
      const file = await FileSystemAPI.readJson(`images/sticker-${id}.json`);
      return file ? { id, src: file.src } : null;
    });
    const items = (await Promise.all(promises)).filter(Boolean);
    UI.renderStickerDrawer(items);
  }
};

const ImageManager = {
  init() {
    EventBus.on(EVENTS.IMAGE_SPAWNED, ({ src, x, y }) => this.spawn(src, x, y));
    EventBus.on(EVENTS.IMAGE_UPDATED, ({ id, updates }) => this.updateImage(id, updates));
    EventBus.on(EVENTS.IMAGE_REMOVED, ({ id }) => this.removeImage(id));
    EventBus.on(EVENTS.APP_RENDERED, () => this.restoreAll());
  },
  async spawn(src, clientX, clientY) {
    const id = Utils.generateId();
    await FileSystemAPI.writeJsonAtomic(`images/${id}.json`, { src });

    let left = 100, top = 100;
    let pageId = StateManager.meta.pageOrder[StateManager.currentP];

    if (clientX !== undefined && clientY !== undefined) {
      const wrapper = Utils.findWrapperByCoords(Array.from(Utils.qsa('.page-wrapper')), clientX);
      if (wrapper) {
        pageId = wrapper.dataset.pageId;
        const offset = Utils.calcRectOffset(clientX, clientY, wrapper.getBoundingClientRect());
        left = offset.x - 50; top = offset.y - 50;
      }
    }

    const imgData = { id, pageId, left, top, layerBucket: 'sticker' };
    StateManager.meta.placedImages.push(imgData);
    EventBus.emit(EVENTS.SAVE_REQUESTED);
    this.renderImage(imgData);
  },
  async renderImage(data) {
    const pageWrapper = Utils.qs(`.page-wrapper[data-page-id="${data.pageId}"]`);
    if (!pageWrapper) return;
    const file = await FileSystemAPI.readJson(`images/${data.id}.json`);
    if (!file || !file.src) return;
    const img = UI.createImageDOM(data, file.src);
    pageWrapper.appendChild(img);
    UI.updateImageDOM(img, data);
  },
  updateImage(id, updates) {
    const imgData = StateManager.meta.placedImages.find(i => i.id === id);
    if (!imgData) return;
    Object.assign(imgData, updates);
    EventBus.emit(EVENTS.SAVE_REQUESTED);
    
    const img = Utils.qs(`img[data-img-id="${id}"]`);
    if (img) {
      if (updates.rotation !== undefined) img.style.rotate = `${updates.rotation}deg`;
      if (updates.layerBucket !== undefined) img.className = `draggable-image layer-${updates.layerBucket}`;
      if (updates.opacity !== undefined) img.style.opacity = updates.opacity;
      if (updates.locked !== undefined) updates.locked ? img.dataset.locked = "true" : delete img.dataset.locked;
      if (updates.left !== undefined || updates.top !== undefined) UI.updateImageDOM(img, imgData);
    }
  },
  restoreAll() {
    Utils.qsa(".draggable-image").forEach(el => el.remove());
    StateManager.meta.placedImages.forEach(data => this.renderImage(data));
  },
  removeImage(id) {
    const idx = StateManager.meta.placedImages.findIndex(i => i.id === id);
    if (idx !== -1) {
      StateManager.meta.placedImages.splice(idx, 1);
      EventBus.emit(EVENTS.SAVE_REQUESTED);
      Utils.qs(`img[data-img-id="${id}"]`)?.remove();
      FileSystemAPI.trashJson(`images/${id}.json`);
    }
  }
};

const RegionManager = {
  isDrawing: false, startX: 0, startY: 0, surfaceId: null, tempEl: null,
  init() {
    EventBus.on(EVENTS.APP_RENDERED, () => this.restoreAll());
  },
  startDrawing(e) {
    const wrapper = e.target.closest('.page-wrapper');
    if (!wrapper || e.target.closest('.region-box') || e.target.closest('.draggable-image') || e.target.closest('button') || e.target.closest('#sticker-drawer') || e.target.closest('#page-indicator')) return;
    
    this.isDrawing = true;
    this.surfaceId = wrapper.dataset.pageId;
    const offset = Utils.calcRectOffset(e.clientX, e.clientY, wrapper.getBoundingClientRect());
    this.startX = offset.x; this.startY = offset.y;
    
    this.tempEl = document.createElement('div');
    this.tempEl.className = "absolute border border-zinc-400 bg-white/20 rounded-lg pointer-events-none layer-focus";
    Object.assign(this.tempEl.style, { left: `${this.startX}px`, top: `${this.startY}px`, width: `0px`, height: `0px` });
    wrapper.appendChild(this.tempEl);
  },
  draw(e) {
    if (!this.isDrawing || !this.tempEl) return;
    const wrapper = Utils.qs(`.page-wrapper[data-page-id="${this.surfaceId}"]`);
    if (!wrapper) return;
    
    const offset = Utils.calcRectOffset(e.clientX, e.clientY, wrapper.getBoundingClientRect());
    const x = Math.min(this.startX, offset.x), y = Math.min(this.startY, offset.y);
    const w = Math.abs(offset.x - this.startX), h = Math.abs(offset.y - this.startY);
    
    Object.assign(this.tempEl.style, { left: `${x}px`, top: `${y}px`, width: `${w}px`, height: `${h}px` });
  },
  stopDrawing(e) {
    if (!this.isDrawing) return;
    this.isDrawing = false;
    if (this.tempEl) {
      const w = parseInt(this.tempEl.style.width), h = parseInt(this.tempEl.style.height);
      const x = parseInt(this.tempEl.style.left), y = parseInt(this.tempEl.style.top);
      this.tempEl.remove(); this.tempEl = null;
      
      if (w > CONFIG.MIN_REGION_SIZE && h > CONFIG.MIN_REGION_SIZE) {
        const regionId = Utils.generateId(), pageId = `page-${Utils.generateId()}`;
        const region = { id: regionId, surfaceId: this.surfaceId, x, y, width: w, height: h, pageId };
        
        StateManager.meta.regions.push(region);
        StateManager.regionPages[pageId] = [StateManager.createBlock()];
        StateManager.rebuildIndex();
        EventBus.emit(EVENTS.SAVE_REQUESTED);
        this.renderRegionBox(region);
        
        setTimeout(() => EventBus.emit(EVENTS.BLOCK_FOCUSED, { id: StateManager.regionPages[pageId][0].id }), 50);
      }
    }
  },
  restoreAll() {
    StateManager.meta.regions.forEach(r => this.renderRegionBox(r));
  },
  renderRegionBox(r) {
    const wrapper = Utils.qs(`.page-wrapper[data-page-id="${r.surfaceId}"]`);
    if (!wrapper) return;
    let el = Utils.qs(`[data-region-id="${r.id}"]`);
    if (!el) {
      el = document.createElement('div');
      el.className = "region-box absolute bg-transparent hover:bg-white/40 border border-transparent hover:border-zinc-200 transition-all duration-300 rounded-lg flex flex-col layer-paper";      el.dataset.regionId = r.id; el.dataset.pageId = r.pageId;
      el.innerHTML = UI.generateRegionBoxHTML(r);
      wrapper.appendChild(el);
    }
    Object.assign(el.style, { left: `${r.x}px`, top: `${r.y}px`, width: `${r.width}px`, height: `${r.height}px` });
    this.renderRegionContent(r.pageId);
  },
  renderRegionContent(pageId) {
    const list = Utils.qs(`.bujo-list[data-region-page-id="${pageId}"]`);
    if (list && StateManager.regionPages[pageId]) {
      list.innerHTML = StateManager.regionPages[pageId].map(b => UI.generateBlockHTML(b)).join("");
    }
  }
};

const Renderer = {
  init() {
    EventBus.on(EVENTS.FORCE_RENDER, () => this.renderApp());
    EventBus.on(EVENTS.PAGE_CHANGED, () => this.updateViewport());
    EventBus.on(EVENTS.RENDER_INDICATOR, () => this.renderIndicator());
    EventBus.on(EVENTS.BLOCK_UPDATED, ({ block }) => UI.updateBlockDOM(block));

  renderApp() {

        <div class="absolute bottom-8 left-0 w-full text-center text-zinc-400 text-sm font-mono tracking-widest select-none pointer-events-none">${i + 1}</div>

};

const EditorEngine = {
  updateText(blockId, newText) {
    const coords = StateManager.getBlockCoords(blockId);
    if (!coords) return;
    let newType = coords.block.type;
    let text = newText;
    
    for (const [prefix, type] of Object.entries(CONFIG.MD_MAP)) {
      if (text.startsWith(prefix)) {
        newType = type;
        text = text.substring(prefix.length);
        break;
      }
    }
    
    StateManager.updateBlock(blockId, { text, type: newType });
    if (newType !== coords.block.type) {
      EventBus.emit(EVENTS.BLOCK_FOCUSED, { id: blockId });
    }
  },
  setBlockType(id, type) { StateManager.updateBlock(id, { type }); },
  indentBlock(id, dir) {
    const c = StateManager.getBlockCoords(id);
    if (c) StateManager.updateBlock(id, { depth: Utils.clamp(c.block.depth + dir, 0, CONFIG.MAX_DEPTH) });
  },
  cycleType(id) {
    const c = StateManager.getBlockCoords(id);
    if (c) this.setBlockType(id, Utils.getNextType(c.block.type));
  },
  splitBlock(id, caretPos) {
    const c = StateManager.getBlockCoords(id);
    if (!c) return;
    const { block } = c;
    const newType = block.type.startsWith("h") ? "text" : block.type;
    const newBlock = StateManager.createBlock(block.text.slice(caretPos), block.depth, newType);
    
    StateManager.updateBlock(id, { text: block.text.slice(0, caretPos) });
    StateManager.addBlock(newBlock, id);
    
    Utils.qs(`[data-id="${block.id}"]`).insertAdjacentHTML("afterend", UI.generateBlockHTML(newBlock));
    EventBus.emit(EVENTS.BLOCK_FOCUSED, { id: newBlock.id });
  },
  mergeWithPrevious(id) {
    const c = StateManager.getBlockCoords(id);
    if (!c || c.bIdx === 0) return;
    const pageArray = c.isRegion ? StateManager.regionPages[c.pageId] : StateManager.pages[c.pIdx];
    const prev = pageArray[c.bIdx - 1];
    const pLen = prev.text.length;
    
    StateManager.updateBlock(prev.id, { text: prev.text + c.block.text });
    StateManager.removeBlock(id);
    
    Utils.qs(`[data-id="${id}"]`)?.remove();
    EventBus.emit(EVENTS.BLOCK_FOCUSED, { id: prev.id, offset: pLen });
  },
  navigateVertical(id, dir) {
    const target = dir === -1 ? Utils.qs(`[data-id="${id}"]`)?.previousElementSibling : Utils.qs(`[data-id="${id}"]`)?.nextElementSibling;
    if (target) EventBus.emit(EVENTS.BLOCK_FOCUSED, { id: target.dataset.id, atEnd: dir === -1 });
  }
};

// ==========================================
// 8. EVENT CONTROLLER
// ==========================================
const EventController = {
  imgDrag: { id: null, offsetX: 0, offsetY: 0, origPointerEvents: "", origZIndex: "", origTransition: "" },
  regionDrag: { id: null, type: null, offsetX: 0, offsetY: 0, startX: 0, startY: 0, startW: 0, startH: 0 },
  draggedId: null,

  init() {
    document.addEventListener("input", e => {
      if (e.target.classList.contains("bullet-text")) {
        EditorEngine.updateText(e.target.closest(".bullet-block").dataset.id, e.target.textContent);
      }
    });
    document.addEventListener("keydown", this.handleKeydown.bind(this));
    
    const bind = (evt, fn) => document.addEventListener(evt, fn.bind(this));
    bind("mousedown", this.handleMouseDown);
    window.addEventListener("mousemove", this.handleMouseMove.bind(this));
    window.addEventListener("mouseup", this.handleMouseUp.bind(this));
    
    bind("paste", this.handlePaste);
    bind("contextmenu", this.handleContextMenu);
    bind("drop", this.handleDrop);
    bind("dblclick", this.handleDblClick);
    bind("dragstart", this.handleDragStart);
    bind("dragover", this.handleDragOver);
    bind("dragend", this.handleDragEnd);
    
    this.initScrubber();
    this.initIndicatorClick();
  },
  
  handleMouseDown(e) {
    // Block handle drag
    const handle = e.target.closest(".bullet-handle");
    if (handle) {
      const block = handle.closest(".bullet-block");
      block.setAttribute("draggable", "true");
      const clean = () => { block.setAttribute("draggable", "false"); document.removeEventListener("mouseup", clean); handle.removeEventListener("mouseleave", clean); };
      document.addEventListener("mouseup", clean); handle.addEventListener("mouseleave", clean);
      return;
    }
    // Image drag
    const img = e.target.closest(".draggable-image");
    if (img && img.dataset.locked !== "true") {
      const offset = Utils.calcRectOffset(e.clientX, e.clientY, img.getBoundingClientRect());
      this.imgDrag = { id: img.dataset.imgId, offsetX: offset.x, offsetY: offset.y, origPointerEvents: img.style.pointerEvents, origZIndex: img.style.zIndex, origTransition: img.style.transition };
      Object.assign(img.style, { pointerEvents: "none", zIndex: "100", transition: "none" });
      return e.preventDefault(), e.stopPropagation();
    }
    // Region resize/move
    const resizer = e.target.closest('.region-resizer');
    if (resizer) {
      const rb = resizer.closest('.region-box');
      this.regionDrag = { id: rb.dataset.regionId, type: 'resize', startX: e.clientX, startY: e.clientY, startW: rb.offsetWidth, startH: rb.offsetHeight };
      return e.preventDefault(), e.stopPropagation();
    }
    const header = e.target.closest('.region-header');
    if (header) {
      const rb = header.closest('.region-box');
      const offset = Utils.calcRectOffset(e.clientX, e.clientY, rb.getBoundingClientRect());
      this.regionDrag = { id: rb.dataset.regionId, type: 'move', offsetX: offset.x, offsetY: offset.y };
      return e.preventDefault(), e.stopPropagation();
    }
    // Global Region Draw
    if (e.button === 0) RegionManager.startDrawing(e);
  },

  handleMouseMove(e) {
    if (this.imgDrag.id) {
      const img = Utils.qs(`img[data-img-id="${this.imgDrag.id}"]`);
      const wrapper = img?.closest('.page-wrapper');
      if (img && wrapper) {
        const offset = Utils.calcRectOffset(e.clientX - this.imgDrag.offsetX, e.clientY - this.imgDrag.offsetY, wrapper.getBoundingClientRect());
        Object.assign(img.style, { left: `${offset.x}px`, top: `${offset.y}px`, transform: 'none' });
      }
    } else if (this.regionDrag.id) {
      const rb = Utils.qs(`.region-box[data-region-id="${this.regionDrag.id}"]`);
      if (!rb) return;
      if (this.regionDrag.type === 'move') {
        const wrapper = rb.closest('.page-wrapper');
        const offset = Utils.calcRectOffset(e.clientX - this.regionDrag.offsetX, e.clientY - this.regionDrag.offsetY, wrapper.getBoundingClientRect());
        Object.assign(rb.style, { left: `${offset.x}px`, top: `${offset.y}px` });
      } else {
        Object.assign(rb.style, {
          width: `${Math.max(CONFIG.MIN_REGION_SIZE, this.regionDrag.startW + (e.clientX - this.regionDrag.startX))}px`,
          height: `${Math.max(CONFIG.MIN_REGION_SIZE, this.regionDrag.startH + (e.clientY - this.regionDrag.startY))}px`
        });
      }
    } else {
      RegionManager.draw(e);
    }
  },

  handleMouseUp(e) {
    if (this.imgDrag.id) {
      const img = Utils.qs(`img[data-img-id="${this.imgDrag.id}"]`);
      if (img) {
        Object.assign(img.style, { pointerEvents: this.imgDrag.origPointerEvents, zIndex: this.imgDrag.origZIndex, transition: this.imgDrag.origTransition });
        const wrapper = Utils.findWrapperByCoords(Array.from(Utils.qsa('.page-wrapper')), e.clientX);
        if (wrapper) {
          if (img.parentElement !== wrapper) wrapper.appendChild(img);
          const offset = Utils.calcRectOffset(e.clientX - this.imgDrag.offsetX, e.clientY - this.imgDrag.offsetY, wrapper.getBoundingClientRect());
          EventBus.emit(EVENTS.IMAGE_UPDATED, { id: this.imgDrag.id, updates: { pageId: wrapper.dataset.pageId, left: offset.x, top: offset.y } });
        }
      }
      this.imgDrag.id = null;
    } else if (this.regionDrag.id) {
      const rb = Utils.qs(`.region-box[data-region-id="${this.regionDrag.id}"]`);
      const rData = StateManager.meta.regions.find(r => r.id === this.regionDrag.id);
      if (rb && rData) {
        if (this.regionDrag.type === 'move') {
          const wrapper = Utils.findWrapperByCoords(Array.from(Utils.qsa('.page-wrapper')), e.clientX);
          if (wrapper) {
            if (rb.parentElement !== wrapper) wrapper.appendChild(rb);
            const offset = Utils.calcRectOffset(e.clientX - this.regionDrag.offsetX, e.clientY - this.regionDrag.offsetY, wrapper.getBoundingClientRect());
            rData.surfaceId = wrapper.dataset.pageId;
            rData.x = offset.x; rData.y = offset.y;
            Object.assign(rb.style, { left: `${rData.x}px`, top: `${rData.y}px` });
          }
        } else {
          rData.width = rb.offsetWidth; rData.height = rb.offsetHeight;
        }
        EventBus.emit(EVENTS.SAVE_REQUESTED);
      }
      this.regionDrag.id = null;
    } else {
      RegionManager.stopDrawing(e);
    }
  },

  handleKeydown(e) {
    const k = e.key, alt = e.altKey, ctrl = e.ctrlKey, shift = e.shiftKey;
    if (!e.target.classList.contains("bullet-text")) {
      if (k === "ArrowLeft" || k === "ArrowRight") { e.preventDefault(); StateManager.changePage(k === "ArrowLeft" ? -1 : 1); }
      return;
    }
    if (k === "Escape") return e.preventDefault(), e.target.blur();
    const bId = e.target.closest(".bullet-block").dataset.id;
    const cPos = SelectionManager.getCaretPos(e.target);

    if (alt && k === "ArrowLeft") return e.preventDefault(), StateManager.changePage(-1);
    if (alt && (k === "ArrowRight" || k === "Enter")) return e.preventDefault(), StateManager.changePage(1);
    if (ctrl && k === "Enter") return e.preventDefault(), EditorEngine.cycleType(bId);
    if (k === "Enter" && !shift) return e.preventDefault(), EditorEngine.splitBlock(bId, cPos);
    if (k === "Tab") return e.preventDefault(), EditorEngine.indentBlock(bId, shift ? -1 : 1);
    if (k === "Backspace" && cPos === 0) {
      e.preventDefault();
      const c = StateManager.getBlockCoords(bId);
      c.block.type !== "text" ? EditorEngine.setBlockType(bId, "text") : (c.bIdx > 0 && EditorEngine.mergeWithPrevious(bId));
      return;
    }
    if (k === "ArrowUp" || k === "ArrowDown") {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const r = sel.getRangeAt(0).getBoundingClientRect(), elR = e.target.getBoundingClientRect();
      if (k === "ArrowUp" && r.top - elR.top < CONFIG.KEY_JUMP_THRESHOLD) return e.preventDefault(), EditorEngine.navigateVertical(bId, -1);
      if (k === "ArrowDown" && elR.bottom - r.bottom < CONFIG.KEY_JUMP_THRESHOLD) return e.preventDefault(), EditorEngine.navigateVertical(bId, 1);
    }
  },

  handlePaste(e) {
    const items = e.clipboardData?.items;
    let imagePasted = false;
    if (items) {
      for (let item of items) {
        if (item.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            if (StickerBookManager.isOpen || e.target?.closest("#sticker-drawer")) EventBus.emit(EVENTS.STICKER_ADDED, { src: ev.target.result });
            else EventBus.emit(EVENTS.IMAGE_SPAWNED, { src: ev.target.result });
          };
          reader.readAsDataURL(item.getAsFile());
          imagePasted = true;
        }
      }
    }
    if (imagePasted) return e.preventDefault();
    if (e.target.classList.contains("bullet-text")) {
      e.preventDefault();
      document.execCommand("insertText", false, e.clipboardData.getData("text/plain"));
    }
  },

  handleDrop(e) {
    try {
      const data = JSON.parse(e.dataTransfer.getData("application/json"));
      if (data?.type === "sticker") return e.preventDefault(), EventBus.emit(EVENTS.IMAGE_SPAWNED, { src: data.src, x: e.clientX, y: e.clientY });
    } catch {}
    if (e.dataTransfer.files?.length) {
      let hasImg = false;
      for (let f of e.dataTransfer.files) {
        if (f.type.startsWith("image/")) {
          hasImg = true;
          const reader = new FileReader();
          reader.onload = (ev) => {
            if (StickerBookManager.isOpen || e.target?.closest("#sticker-drawer")) EventBus.emit(EVENTS.STICKER_ADDED, { src: ev.target.result });
            else EventBus.emit(EVENTS.IMAGE_SPAWNED, { src: ev.target.result, x: e.clientX, y: e.clientY });
          };
          reader.readAsDataURL(f);
        }
      }
      if (hasImg) e.preventDefault();
    }
  },

  handleContextMenu(e) {
    const regionHeader = e.target.closest(".region-header");
    const img = e.target.closest(".draggable-image");
    const sticker = e.target.closest(".sticker-item");
    
    if (regionHeader) {
      e.preventDefault();
      const id = regionHeader.closest(".region-box").dataset.regionId;
      UI.renderContextMenu(e.clientX, e.clientY, [
        { label: "🗑️ Delete Region", danger: true, action: () => {
          const idx = StateManager.meta.regions.findIndex(r => r.id === id);
          if (idx !== -1) {
            const r = StateManager.meta.regions.splice(idx, 1)[0];
            delete StateManager.regionPages[r.pageId];
            FileSystemAPI.trashJson(`pages/${r.pageId}.json`);
            Utils.qs(`[data-region-id="${id}"]`)?.remove();
            StateManager.rebuildIndex();
            EventBus.emit(EVENTS.SAVE_REQUESTED);
          }
        }}
      ]);
    } else if (img) {
      e.preventDefault();
      const id = img.dataset.imgId;
      const data = StateManager.meta.placedImages.find(i => i.id === id);
      if (!data) return;
      UI.renderContextMenu(e.clientX, e.clientY, [
        { label: data.locked ? "🔓 Unlock Position" : "🔒 Lock Position", action: () => EventBus.emit(EVENTS.IMAGE_UPDATED, { id, updates: { locked: !data.locked } }) },
        { label: "🔄 Rotate 45°", action: () => EventBus.emit(EVENTS.IMAGE_UPDATED, { id, updates: { rotation: ((data.rotation || 0) + 45) % 360 } }) },
        { label: "🔼 Bring Forward", action: () => EventBus.emit(EVENTS.IMAGE_UPDATED, { id, updates: { layerBucket: Utils.getNextLayer(data.layerBucket || 'sticker', 1) } }) },
        { label: "🔽 Send Backward", action: () => EventBus.emit(EVENTS.IMAGE_UPDATED, { id, updates: { layerBucket: Utils.getNextLayer(data.layerBucket || 'sticker', -1) } }) },
        { label: "👻 Change Opacity", action: () => EventBus.emit(EVENTS.IMAGE_UPDATED, { id, updates: { opacity: Utils.getNextOpacity(data.opacity) } }) },
        { label: "🗑️ Delete Image", danger: true, action: () => EventBus.emit(EVENTS.IMAGE_REMOVED, { id }) }
      ]);
    } else if (sticker) {
      e.preventDefault();
      UI.renderContextMenu(e.clientX, e.clientY, [
        { label: "🗑️ Delete Sticker", danger: true, action: () => EventBus.emit(EVENTS.STICKER_REMOVED, { id: sticker.dataset.stickerId }) }
      ]);
    }
  },

  async handleDblClick(e) {
    if (e.target.classList.contains("draggable-image")) {
      const file = await FileSystemAPI.readJson(`images/${e.target.dataset.imgId}.json`);
      if (file) EventBus.emit(EVENTS.STICKER_ADDED, { src: file.src });
      e.target.style.scale = "1.2"; setTimeout(() => e.target.style.scale = "1", 200);
    }
  },

  handleDragStart(e) {
    const block = e.target.closest(".bullet-block");
    if (block?.getAttribute("draggable") === "true") {
      this.draggedId = block.dataset.id;
      Promise.resolve().then(() => block.classList.add("dragging"));
    } else e.preventDefault();
  },

  handleDragOver(e) {
    e.preventDefault();
    const target = e.target.closest(".bullet-block");
    if (target && target.dataset.id !== this.draggedId) {
      const rect = target.getBoundingClientRect(), el = Utils.qs(`[data-id="${this.draggedId}"]`);
      target.parentNode.insertBefore(el, e.clientY > rect.top + rect.height / 2 ? target.nextSibling : target);
    }
  },

  handleDragEnd() {
    const el = Utils.qs(`[data-id="${this.draggedId}"]`);
    if (el) {
      el.classList.remove("dragging"); el.setAttribute("draggable", "false");
      const prev = el.previousElementSibling, next = el.nextElementSibling, list = el.closest(".bujo-list");
      if (list) prev ? StateManager.moveBlockDOM(this.draggedId, prev.dataset.id, true) : next && StateManager.moveBlockDOM(this.draggedId, next.dataset.id, false);
    }
    this.draggedId = null;
  },

  initIndicatorClick() {
    Utils.gid(DOM_IDS.INDICATOR).addEventListener("click", e => {
      const dot = e.target.closest(".indicator-dot");
      if (dot) StateManager.changePage(parseInt(dot.dataset.idx), false);
    });
  },

  initScrubber() {
    const ind = Utils.gid(DOM_IDS.INDICATOR);
    let isScrubbing = false;
    const scrub = (e) => {
      const r = ind.getBoundingClientRect(), pC = StateManager.pages.length;
      if (pC <= 1) return;
      const idx = Utils.clamp(Math.floor((Utils.clamp(e.clientX - r.left, 0, r.width) / r.width) * pC), 0, pC - 1);
      if (StateManager.currentP !== idx) StateManager.changePage(idx, false);
    };
    ind.addEventListener("pointerdown", e => { isScrubbing = true; Utils.gid(DOM_IDS.APP).style.transitionDuration = "0s"; ind.setPointerCapture(e.pointerId); scrub(e); });
    ind.addEventListener("pointermove", e => isScrubbing && scrub(e));
    ind.addEventListener("pointerup", e => { isScrubbing = false; Utils.gid(DOM_IDS.APP).style.transitionDuration = ""; ind.releasePointerCapture(e.pointerId); EventBus.emit(EVENTS.SAVE_REQUESTED); });
  }
};

// ==========================================
// 9. APP INITIALIZATION
// ==========================================
async function startApp() {
  StorageManager.init();
  SelectionManager.init();
  ImageManager.init();
  RegionManager.init();
  Renderer.init();
  
  await StateManager.init();
  StickerBookManager.init();
  EventController.init();
  
  EventBus.emit(EVENTS.FORCE_RENDER);
}

startApp();

    </script>
